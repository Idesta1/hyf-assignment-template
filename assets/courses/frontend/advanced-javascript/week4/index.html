<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Screenshot Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Website Screenshot Generator</h1>
      <h3>Fast, reliable website snapshots</h3>
      <p>
        Capture high-quality screenshots of any website with our easy-to-use
        generator.
      </p>
      <form>
        <label for="url">Enter website URL:</label>
        <input
          type="text"
          id="url"
          name="url"
          placeholder="https://example.com"
        />
        <button type="submit">Generate Screenshot</button>
      </form>
      <div id="thumbnail">
        <img
          id="screenshot"
          src="./images/screenshot1.PNG"
          alt="Website Screenshot"
          width="400"
        />
      </div>
    </main>
    <footer class="footer">
      <small
        >Coded by
        <a href="https://www.linkedin.com/in/iglesia-desta-/">Iglesia Desta</a>
        Mar 2026&copy
        <a href="https://www.hackyourfuture.dk/" target="_blank"
          ><strong>HackYourFuture</strong></a
        ></small
      >
    </footer>

    <script src="scripts.js"></script>
  </body>
</html>
