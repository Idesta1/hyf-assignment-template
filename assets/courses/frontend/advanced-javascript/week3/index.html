<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Currency Converter</h1>

      <select id="fromCurrency"></select>
      <input type="number" id="amount" placeholder="Enter amount" min="0" />
      <div class="actionRow">
        <button id="convert">Convert</button>
        <button id="swapCurrencies" type="button" aria-label="Swap currencies">
          ↕
        </button>
      </div>

      <select id="toCurrency"></select>
      <input type="number" id="resultInput" />
      <h1 id="result"></h1>
    </main>
    <footer class="footer">
      <small
        >Coded by
        <a href="https://github.com/Idesta1" target="_blank">Iglesia Desta</a>
        March 2026&copy
        <a href="https://www.hackyourfuture.dk/" target="_blank"
          ><strong>HackYourFuture</strong></a
        ></small
      >
    </footer>

    <script src="script.js"></script>
  </body>
</html>
